name: Deploy RelayForge AI

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: relayforge-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        run: npm run build --workspace @relayforge/web

      - name: Typecheck
        run: npm run typecheck

      - name: Sync Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set -euo pipefail

          sync_secret() {
            local secret_name="$1"
            local secret_value="${!secret_name:-}"

            if [ -z "$secret_value" ]; then
              echo "::warning::Skipping ${secret_name}; GitHub secret is not set"
              return 0
            fi

            printf '%s' "$secret_value" | npx wrangler secret put "$secret_name" --config apps/worker/wrangler.toml
          }

          sync_secret GROQ_API_KEY
          sync_secret SAMBANOVA_API_KEY
          sync_secret CEREBRAS_API_KEY
          sync_secret GEMINI_API_KEY
          sync_secret OPENROUTER_API_KEY

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config apps/worker/wrangler.toml

      - name: Deploy Pages (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy apps/web/out --project-name relayforge-ai --branch main
